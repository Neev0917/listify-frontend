<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listify — Your tasks, beautifully organized</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Top Nav -->
    <nav class="topnav">
        <div class="nav-inner">
            <div class="logo">
                <div class="logo-mark">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8.5L6.5 12L13 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">Listify</span>
                <span class="logo-tagline">Your tasks, beautifully organized</span>
            </div>
            <div class="nav-right">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <span class="user-email" id="userEmail">Loading...</span>
                </div>
                <div class="notif-wrap">
                    <button class="notif-btn" onclick="toggleNotifDropdown()" aria-label="Notifications">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M9 1.5a5.5 5.5 0 00-5.5 5.5v3l-1.5 2.5h14L14.5 10V7A5.5 5.5 0 009 1.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M7 14.5a2 2 0 004 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span class="notif-badge" id="notifBadge" style="display:none">0</span>
                    </button>
                    <div class="notif-dropdown" id="notifDropdown" style="display:none">
                        <div class="notif-header">
                            <span>Notifications</span>
                            <button onclick="toggleNotifDropdown()">&times;</button>
                        </div>
                        <div class="notif-list" id="notifList">
                            <div class="notif-empty">No notifications</div>
                        </div>
                    </div>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                    <span class="theme-icon theme-icon--dark">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <path d="M13.5 10.5A6 6 0 015.5 2.5a6 6 0 108 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="theme-icon theme-icon--light">
                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                            <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                </button>
                <button class="logout-btn" onclick="signOut()">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M5 1H2a1 1 0 00-1 1v10a1 1 0 001 1h3M10 10l3-3-3-3M13 7H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Sign out
                </button>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="app">

        <!-- Stats row -->
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-value" id="totalCount">0</span>
                <span class="stat-label">Total Tasks</span>
            </div>
            <div class="stat-card">
                <span class="stat-value green" id="doneCount">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card">
                <span class="stat-value blue" id="pendingCount">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-card stat-card--progress">
                <div class="big-progress-wrap">
                    <div class="big-progress-bar">
                        <div class="big-progress-fill" id="progressFill"></div>
                    </div>
                    <span class="big-progress-label" id="progressLabel">0%</span>
                </div>
                <span class="stat-label">Progress</span>
            </div>
        </div>

        <!-- Input -->
        <section class="input-card">
            <div class="input-row">
                <div class="input-icon">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                        <path d="M7.5 1V14M1 7.5H14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </div>
                <input
                    type="text"
                    id="myInput"
                    class="task-input"
                    placeholder="What needs to be done?"
                    autocomplete="off"
                    onkeydown="if(event.key==='Enter') addTask()"
                />
                <select id="prioritySelect" class="priority-select">
                    <option value="High">🔴 High</option>
                    <option value="Medium" selected>🟡 Medium</option>
                    <option value="Low">🟢 Low</option>
                </select>
                <input type="date" id="dueDateInput" class="due-date-input" title="Set due date" />
                <button onclick="addTask()" class="add-btn">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M7 1V13M1 7H13" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Add task
                    <kbd>↵</kbd>
                </button>
            </div>
        </section>

        <!-- Task list -->
        <section class="tasks-card">
            <div class="tasks-header">
                <span class="tasks-title">Tasks</span>
                <div class="tasks-header-right">
                    <button class="clear-btn" id="clearBtn" onclick="clearCompleted()" style="display:none;">
                        Clear completed
                    </button>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                <div class="empty-visual">
                    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                        <rect x="12" y="16" width="32" height="4" rx="2" fill="currentColor" opacity="0.18"/>
                        <rect x="12" y="26" width="24" height="4" rx="2" fill="currentColor" opacity="0.11"/>
                        <rect x="12" y="36" width="16" height="4" rx="2" fill="currentColor" opacity="0.06"/>
                    </svg>
                </div>
                <p class="empty-title">No tasks yet</p>
                <p class="empty-sub">Add your first task above to get started</p>
            </div>

            <ul id="myUL" class="task-list"></ul>
        </section>

        <p class="hint">Click a task to toggle &nbsp;·&nbsp; Press <kbd class="kbd-sm">Enter</kbd> to add</p>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
